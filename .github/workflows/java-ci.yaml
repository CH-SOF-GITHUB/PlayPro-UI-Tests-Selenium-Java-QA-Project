name: Java CI with Maven

on:
  push:
    branches: [ "circleci-project-setup" ]
  pull_request:
    branches: [ "circleci-project-setup" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # CHECKOUT CODE
      # =========================
      - uses: actions/checkout@v4

      # =========================
      # SETUP JAVA
      # =========================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # =========================
      # BUILD METADATA
      # =========================
      - name: Set build variables
        run: |
          echo "BUILD_NAME=PR-${{ github.event.pull_request.number }}-${{ github.sha }}" >> $GITHUB_ENV
          echo "REPO_NAME=${{ github.repository }}" >> $GITHUB_ENV
          echo "GITHUB_RUN_ID=${{ github.run_id }}" >> $GITHUB_ENV

      # =========================
      # BUILD PROJECT
      # =========================
      - name: Clean and compile
        run: mvn clean compile

      # =========================
      # INSTALL CHROME (IMPORTANT FIX)
      # =========================
      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Verify Chrome
        run: |
          google-chrome --version
          which google-chrome
          echo "CHROME_BINARY=$(which google-chrome)" >> $GITHUB_ENV

      # =========================
      # NODE JS SETUP (IF YOU USE JS TESTS)
      # =========================
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'src/test/java/js/package-lock.json'

      - name: Install JS dependencies
        working-directory: src/test/java/js
        env:
          CHROMEDRIVER_SKIP_DOWNLOAD: 'true'
        run: npm install

      # =========================
      # RUN JS SELENIUM TEST
      # =========================
      - name: Run JS Selenium test
        working-directory: src/test/java/js
        env:
          DISPLAY: :99
          CHROME_BIN: ${{ env.CHROME_BINARY }}
        run: |
          xvfb-run --auto-servernum \
          --server-args="-screen 0 1920x1080x24" \
          node Selenium/tests/quickStart.js

      # =========================
      # RUN WEBDRIVERIO TESTS
      # =========================
      - name: Run WebdriverIO Tests
        working-directory: src/test/java/js/WebdriverIO
        env:
          DISPLAY: :99
          CHROME_BIN: ${{ env.CHROME_BINARY }}
        run: |
          xvfb-run --auto-servernum \
          --server-args="-screen 0 1920x1080x24" \
          node ./node_modules/@wdio/cli/bin/wdio.js run wdio.conf.js

      # =========================
      # SCREENSHOTS TRACKING
      # =========================
      - name: List screenshots before tests
        run: |
          mkdir -p src/test/java/tests/screenshots
          ls src/test/java/tests/screenshots > screenshots_before.txt || true

      # =========================
      # RUN JAVA TESTS (SELENIUM + TESTNG)
      # =========================
      - name: Run Selenium Java Tests
        env:
          CHROME_BINARY: ${{ env.CHROME_BINARY }}
        run: mvn -B -Dtest=tests.PlayPro.DEV.LambdaTest.Chrome.Reservations.TC03 test

      # =========================
      # SCREENSHOTS AFTER TEST
      # =========================
      - name: List screenshots after test
        run: |
          ls src/test/java/tests/screenshots > screenshots_after.txt || true

      - name: Detect new screenshots
        id: detect
        run: |
          comm -13 screenshots_before.txt screenshots_after.txt > new_screenshots.txt || true
          if [ -s new_screenshots.txt ]; then
            echo "has_new_screenshots=true" >> $GITHUB_OUTPUT
          else
            echo "has_new_screenshots=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload screenshots artifact
        if: steps.detect.outputs.has_new_screenshots == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: src/test/java/tests/screenshots
