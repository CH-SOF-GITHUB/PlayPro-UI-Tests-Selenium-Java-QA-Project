name: Selenide UI Tests

on:
  push:
    branches: [ "circleci-project-setup" ]
  pull_request:
    branches: [ "circleci-project-setup" ]

jobs:
  selenide-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build project
        run: mvn clean compile

      - name: Run Selenide tests
        run: mvn -Dtest=Selenide.UI.PlayPro.Web.Front.Login.TC01 test

      - name: Upload Selenide Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenide-reports
          path: target/selenide-ci-reports
